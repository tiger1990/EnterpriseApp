# noinspection UnusedVersionCatalogEntry
[versions]
# ─── Build Tools ──────────────────────────────────────────────────────────────
agp                     = "9.0.1"
kotlin                  = "2.3.10"
ksp                     = "2.3.2"
compileSdk              = "36"
targetSdk              = "36"
minSdk                  = "28"

# ─── AndroidX Core ────────────────────────────────────────────────────────────
coreKtx                 = "1.17.0"
lifecycle               = "2.10.0"
activityCompose         = "1.12.4"
savedstate              = "1.4.0"

# ─── Compose ──────────────────────────────────────────────────────────────────
composeBom              = "2026.02.01"
composeAnimation        = "1.10.4"

# ─── Navigation 3 (latest) ────────────────────────────────────────────────────
# Nav3 is the new type-safe navigation API introduced as experimental in AGP 8.x
navigationCompose       = "2.9.7"

# ─── DI ───────────────────────────────────────────────────────────────────────
hilt                    = "2.59.2"
hiltNavigationCompose   = "1.3.0"
hiltExt                 = "1.3.0"

# ─── Coroutines ───────────────────────────────────────────────────────────────
coroutines              = "1.10.2"

# ─── Serialization ────────────────────────────────────────────────────────────
kotlinSerialization     = "1.10.0"

# ─── Network ──────────────────────────────────────────────────────────────────
retrofit                = "3.0.0"
okhttp                  = "5.3.2"

# ─── Performance ──────────────────────────────────────────────────────────────
## Latest stable for AGP 9.0+ support
androidx-baselineprofile = "1.3.4"

#faced issue:"Extension of type 'TestExtension' does not exist"
#baselineProfile         = "1.4.1"
#macrobenchmark          = "1.4.1"

baselineProfile         = "1.5.0-alpha03"
macrobenchmark          = "1.5.0-alpha03"
uiautomator             = "2.3.0"
# Required for API 35+ support
profileInstaller        = "1.4.1"

# ─── google ──────────────────────────────────────────────────────────────
googleServices = "4.4.4"

# ─── Testing ──────────────────────────────────────────────────────────────────
junit4                  = "4.13.2"
junitExt                = "1.3.0"
espresso                = "3.7.0"
paparazzi               = "1.3.5"
turbine                 = "1.2.1"
mockk                   = "1.14.9"
robolectric             = "4.16.1"

[libraries]
# Core
androidx-core-ktx                       = { group = "androidx.core",            name = "core-ktx",                          version.ref = "coreKtx" }
androidx-lifecycle-runtime-ktx          = { group = "androidx.lifecycle",        name = "lifecycle-runtime-ktx",             version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-ktx        = { group = "androidx.lifecycle",        name = "lifecycle-viewmodel-ktx",           version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-compose    = { group = "androidx.lifecycle",        name = "lifecycle-viewmodel-compose",       version.ref = "lifecycle" }
androidx-lifecycle-runtime-compose      = { group = "androidx.lifecycle",        name = "lifecycle-runtime-compose",         version.ref = "lifecycle" }
androidx-lifecycle-viewmodel-savedstate = { group = "androidx.lifecycle",        name = "lifecycle-viewmodel-savedstate",    version.ref = "lifecycle" }
androidx-activity-compose               = { group = "androidx.activity",         name = "activity-compose",                  version.ref = "activityCompose" }
androidx-savedstate-ktx                 = { group = "androidx.savedstate",       name = "savedstate-ktx",                    version.ref = "savedstate" }

# Compose BOM – pins all compose versions
androidx-compose-bom           = { group = "androidx.compose",    name = "compose-bom",           version.ref = "composeBom" }
androidx-compose-ui            = { group = "androidx.compose.ui", name = "ui" }
androidx-compose-ui-graphics   = { group = "androidx.compose.ui", name = "ui-graphics" }
androidx-compose-ui-tooling    = { group = "androidx.compose.ui", name = "ui-tooling" }
androidx-compose-ui-preview    = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
androidx-compose-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }
androidx-compose-ui-test       = { group = "androidx.compose.ui", name = "ui-test-junit4" }
androidx-compose-material3     = { group = "androidx.compose.material3", name = "material3" }
androidx-compose-animation     = { group = "androidx.compose.animation", name = "animation",  version.ref = "composeAnimation" }
androidx-compose-animation-core = { group = "androidx.compose.animation", name = "animation-core", version.ref = "composeAnimation" }

# Navigation 3 (type-safe, serialization-based routes)
androidx-navigation-compose    = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigationCompose" }

# Standard Dependency Injection (DI) API.
# It doesn't provide the "engine" that performs the injection; rather,
# it provides the annotations (the labels) that tell an engine—like Dagger or Hilt—what to do.
javax-inject = "javax.inject:javax.inject:1"

# Hilt
hilt-android          = { group = "com.google.dagger", name = "hilt-android",          version.ref = "hilt" }
hilt-compiler         = { group = "com.google.dagger", name = "hilt-android-compiler",  version.ref = "hilt" }
hilt-navigation       = { group = "androidx.hilt",     name = "hilt-navigation-compose",version.ref = "hiltExt" }
hilt-testing          = { group = "com.google.dagger", name = "hilt-android-testing",   version.ref = "hilt" }

# Coroutines
kotlinx-coroutines-android = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-coroutines-test    = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-test",    version.ref = "coroutines" }

# Serialization
kotlinx-serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlinSerialization" }

# Network
retrofit-core               = { group = "com.squareup.retrofit2", name = "retrofit",                         version.ref = "retrofit" }
retrofit-serialization      = { group = "com.squareup.retrofit2", name = "converter-kotlinx-serialization",  version.ref = "retrofit" }
okhttp-core                 = { group = "com.squareup.okhttp3",   name = "okhttp",                           version.ref = "okhttp" }
okhttp-logging              = { group = "com.squareup.okhttp3",   name = "logging-interceptor",              version.ref = "okhttp" }

# Baseline / Macrobenchmark
androidx-baseline-profile  = { group = "androidx.baselineprofile", name = "androidx.baselineprofile.gradle.plugin", version.ref = "baselineProfile" }
androidx-profileinstaller        = { group = "androidx.profileinstaller",  name = "profileinstaller",        version.ref = "profileInstaller" }
androidx-benchmark-baseline-profile-gradle-plugin = { group = "androidx.benchmark", name = "benchmark-baseline-profile-gradle-plugin", version.ref = "baselineProfile" }
androidx-benchmark-macro        = { group = "androidx.benchmark",        name = "benchmark-macro-junit4",  version.ref = "macrobenchmark" }
androidx-uiautomator             = { group = "androidx.test.uiautomator",  name = "uiautomator",             version.ref = "uiautomator" }


# Testing
junit4                    = { group = "junit",              name = "junit",              version.ref = "junit4" }
androidx-junit            = { group = "androidx.test.ext",  name = "junit",              version.ref = "junitExt" }
androidx-espresso         = { group = "androidx.test.espresso", name = "espresso-core",  version.ref = "espresso" }
paparazzi                 = { group = "app.cash.paparazzi", name = "paparazzi",           version.ref = "paparazzi" }
turbine                   = { group = "app.cash.turbine",   name = "turbine",             version.ref = "turbine" }
mockk                     = { group = "io.mockk",           name = "mockk",               version.ref = "mockk" }
mockk-android             = { group = "io.mockk",           name = "mockk-android",       version.ref = "mockk" }
robolectric               = { group = "org.robolectric",    name = "robolectric",          version.ref = "robolectric" }


# Dependencies for your Convention Plugins (build-logic)
android-gradlePlugin = { group = "com.android.tools.build", name = "gradle", version.ref = "agp" }
kotlin-gradlePlugin = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin" }
ksp-gradlePlugin = { group = "com.google.devtools.ksp", name = "com.google.devtools.ksp.gradle.plugin", version.ref = "ksp" }

[plugins]
android-application  = { id = "com.android.application",                  version.ref = "agp" }
android-library      = { id = "com.android.library",                      version.ref = "agp" }
android-test         = { id = "com.android.test",                         version.ref = "agp" }
kotlin-jvm           = { id = "org.jetbrains.kotlin.jvm",                 version.ref = "kotlin" }
compose-compiler     = { id = "org.jetbrains.kotlin.plugin.compose",      version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization",version.ref = "kotlin" }
kotlin-parcelize     = { id = "org.jetbrains.kotlin.plugin.parcelize",    version.ref = "kotlin" }
hilt                 = { id = "com.google.dagger.hilt.android",           version.ref = "hilt" }
ksp                  = { id = "com.google.devtools.ksp",                  version.ref = "ksp" }
baseline-profile     = { id = "androidx.baselineprofile",                 version.ref = "baselineProfile" }
paparazzi            = { id = "app.cash.paparazzi",                       version.ref = "paparazzi" }

google-services      = { id = "com.google.gms.google-services",           version.ref = "googleServices" }

#Convention plugins
enterprise-android-application = { id = "enterprise.android.application" }
enterprise-android-library = { id = "enterprise.android.library" }
enterprise-android-feature = { id = "enterprise.android.feature" }
enterprise-android-hilt = { id = "enterprise.android.hilt" }
enterprise-android-ksp = { id = "enterprise.android.ksp" }
enterprise-android-application-compose = { id = "enterprise.android.application.compose" }
enterprise-android-library-compose = { id = "enterprise.android.library.compose" }
enterprise-android-application-baselineprofile = { id = "enterprise.android.application.baselineprofile" }
